# Nexa 编译器 rustfmt 配置
# 使用稳定版 rustfmt 功能

# === 基本设置 ===

# 最大的行宽度
max_width = 100

# tab 宽度
tab_spaces = 4

# === 格式化选项 ===

# 重新排序 import
reorder_modules = true
remove_nested_parens = true

# === 启发式设置 ===

# 在大屏幕上使用更紧凑的格式
use_small_heuristics = "Max"

# 使用字段初始化简写
use_field_init_shorthand = true

# 格式化 match 分支
match_block_trailing_comma = true

# === 稳定版功能 ===

# 函数参数换行时缩进
fn_params_layout = "Tall"
